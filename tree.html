<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Tree Structures</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
    <h1>Ⅲ. Tree Structures</h1>

    <div class="ds-section">
        <h3>Ⅰ. 이진 탐색 트리 (Binary Search Tree)</h3>
        <div class="controls">
            <input type="number" id="bstInput" placeholder="숫자 입력">
            <button id="bstInsertBtn">Insert Node</button>
        </div>
        <div id="bst-visualizer" class="visualizer"></div>
        <div class="description">
            <strong>정의:</strong> 부모 노드를 기준으로 왼쪽에는 작은 값, 오른쪽에는 큰 값을 배치하는 계층적 구조입니다.<br>
            <strong>장단점:</strong> 균형 잡힌 상태에서 검색, 삽입, 삭제가 모두 $O(\log n)$으로 매우 빠르지만, 트리가 편향될 경우 성능이 저하됩니다.<br>
            <strong>활용 사례:</strong> 데이터베이스 인덱싱, 파일 시스템 탐색 관리 등에 활용됩니다.
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
