<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>이진 탐색 트리 시뮬레이터</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages/tree.css" />
  </head>
  <body class="page-tree">
    <div class="main-container">
      <div class="header-area">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1 class="simulator-title">이진 탐색 트리 시뮬레이터</h1>
      </div>

      <div class="simulator-box">
        <div class="control-group">
          <input
            type="number"
            id="treeInput"
            class="control-input value-input"
            placeholder="값 입력"
          />
          <button id="treeInsertBtn" class="btn btn-green">
            노드 추가 O(log n)
          </button>
          <button id="treeDeleteBtn" class="btn btn-red">
            노드 삭제 O(log n)
          </button>
          <button id="treeSearchBtn" class="btn btn-purple">
            값 검색 O(log n)
          </button>
        </div>

        <div class="control-group" id="treeExtraControls">
          <button id="treeInorderBtn" class="btn btn-blue">중위 순회</button>
          <button id="treePreorderBtn" class="btn btn-blue">전위 순회</button>
          <button id="treePostorderBtn" class="btn btn-purple">
            후위 순회
          </button>
          <button id="treeClearBtn" class="btn btn-gray">초기화</button>
        </div>

        <div
          id="tree-result"
          class="tree-result"
        ></div>

        <div
          id="tree-visualizer"
          class="visualizer-area tree-visualizer"
        ></div>

        <div class="info-panel">
          • 현재 모드:
          <span id="treeTypeLabel" class="stat-value">이진 탐색 트리 (BST)</span
          ><br />
          <span class="hint-text"
            >* 시간 복잡도: 검색/삽입/삭제 O(log n) (균형 트리 기준)</span
          >
        </div>
      </div>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
