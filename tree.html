<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>트리 구조 시뮬레이터</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="main-container">
      <div class="header-area">
        <a href="index.html" class="back-btn">← 뒤로가기</a>
        <h1 class="simulator-title">트리 구조 시뮬레이터</h1>
      </div>

      <div class="simulator-box">
        <div class="control-group">
          <select
            id="treeTypeSelect"
            class="control-select"
            style="width: 200px; cursor: pointer"
          >
            <option value="bst">이진 탐색 트리 (BST)</option>
            <option value="avl">AVL 트리 (자가 균형)</option>
            <option value="heap">최대 힙 (Max Heap)</option>
          </select>
          <input
            type="number"
            id="treeInput"
            class="control-input"
            placeholder="값 입력"
            style="flex-grow: 1"
          />
          <button id="treeInsertBtn" class="btn btn-green">
            노드 추가 O(log n)
          </button>
          <button id="treeDeleteBtn" class="btn btn-red">
            노드 삭제 O(log n)
          </button>
          <button id="treeSearchBtn" class="btn btn-purple">
            값 검색 O(log n)
          </button>
        </div>

        <div class="control-group" id="treeExtraControls">
          <button id="treeInorderBtn" class="btn btn-blue">중위 순회</button>
          <button id="treePreorderBtn" class="btn btn-blue">전위 순회</button>
          <button id="treePostorderBtn" class="btn btn-purple">
            후위 순회
          </button>
          <button id="treeClearBtn" class="btn btn-gray">초기화</button>
        </div>

        <div
          id="tree-result"
          style="
            margin-bottom: 15px;
            font-weight: bold;
            color: #1e3a8a;
            min-height: 24px;
          "
        ></div>

        <div
          id="heap-array-visualizer"
          class="visualizer-area array-style"
          style="
            min-height: 80px;
            margin-bottom: 15px;
            display: none;
            padding: 20px;
          "
        ></div>

        <div
          id="tree-visualizer"
          class="visualizer-area"
          style="height: 400px; align-items: flex-start; padding-top: 30px"
        ></div>

        <div class="info-panel">
          • 트리 높이: <span id="treeHeight" style="font-weight: bold">0</span
          ><br />
          • 현재 모드:
          <span id="treeTypeLabel" style="font-weight: bold"
            >이진 탐색 트리 (BST)</span
          ><br />
          <span style="color: #94a3b8; font-size: 0.85rem"
            >* 시간 복잡도: 검색/삽입/삭제 O(log n) (균형 트리 기준)</span
          >
        </div>
      </div>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
