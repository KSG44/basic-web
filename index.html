<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전공자용 통합 자료구조 시뮬레이터</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>통합 자료구조 시뮬레이터</h1>

    <div class="ds-section">
        <h3>1. 스택 (Stack)</h3>
        <div class="controls">
            <input type="text" id="stackInput" placeholder="데이터 입력">
            <button id="pushBtn">Push</button>
            <button id="popBtn">Pop</button>
        </div>
        <div id="stack-visualizer" class="visualizer"></div>
    </div>

    <div class="ds-section">
        <h3>2. 큐 (Queue)</h3>
        <div class="controls">
            <input type="text" id="queueInput" placeholder="데이터 입력">
            <button id="enqueueBtn">Enqueue</button>
            <button id="dequeueBtn">Dequeue</button>
        </div>
        <div id="queue-visualizer" class="visualizer"></div>
    </div>

    <div class="ds-section">
        <h3>3. 단일 연결 리스트 (Singly Linked List)</h3>
        <div class="controls">
            <input type="text" id="llInput" placeholder="데이터 입력">
            <input type="number" id="llIndex" placeholder="인덱스" style="width: 80px;">
            <button id="appendBtn">Append</button>
            <button id="insertAtBtn">Insert At</button>
            <button id="removeFirstBtn">Remove First</button>
        </div>
        <div id="ll-visualizer" class="visualizer"></div>
    </div>

    <div class="ds-section">
        <h3>4. 해시 테이블 (Hash Table)</h3>
        <div class="controls">
            <input type="text" id="hashInput" placeholder="키 입력">
            <button id="hashInsertBtn">Insert</button>
        </div>
        <div id="hash-visualizer" class="visualizer"></div>
    </div>

    <div class="ds-section">
        <h3>5. 이진 탐색 트리 (BST)</h3>
        <div class="controls">
            <input type="number" id="bstInput" placeholder="숫자 입력">
            <button id="bstInsertBtn">Insert</button>
        </div>
        <div id="bst-visualizer" class="visualizer"></div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
